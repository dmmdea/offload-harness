# llama-swap.win-vulkan.yaml — offload-harness family on the llama.cpp VULKAN backend
# (native Windows; AMD Radeon incl. 780M/gfx1103, or any Vulkan GPU).
# Serving invariants (grammar reliability — do NOT change): --jinja, f16 KV, no MTP,
# reasoning off. MoE tier: full offload first; if the selftest hits allocation
# failures on your machine, add --cpu-moe to the 26b cmd (experts stay in RAM).
healthCheckTimeout: 300
logLevel: info

macros:
  common: >-
    --ctx-size 8192 --flash-attn on --cache-type-k f16 --cache-type-v f16
    --jinja --reasoning off --port ${PORT} --host 127.0.0.1

models:
  offload-e4b:
    aliases: [gemma4-e4b]
    cmd: >-
      __LLAMA_BIN__\llama-server.exe -m __MODELS__\gemma-4-E4B-it-qat-UD-Q4_K_XL.gguf
      -ngl 999 --parallel 1 ${common}
    ttl: 300
  gemma4-e2b:
    cmd: >-
      __LLAMA_BIN__\llama-server.exe -m __MODELS__\gemma-4-E2B-it-qat-UD-Q4_K_XL.gguf
      -ngl 999 ${common}
    ttl: 300
  gemma4-26b-a4b:
    cmd: >-
      __LLAMA_BIN__\llama-server.exe -m __MODELS__\gemma-4-26B-A4B-it-qat-UD-Q4_K_XL.gguf
      -ngl 999 --parallel 1 ${common}
    ttl: 300
  embeddinggemma:
    cmd: >-
      __LLAMA_BIN__\llama-server.exe -m __MODELS__\embeddinggemma-300m-Q8_0.gguf
      --embedding --pooling mean --ctx-size 2048 --parallel 4 --port ${PORT} --host 127.0.0.1
    ttl: 600

groups:
  offload-family:
    swap: true
    exclusive: true
    members: [offload-e4b, gemma4-e2b, gemma4-26b-a4b]
