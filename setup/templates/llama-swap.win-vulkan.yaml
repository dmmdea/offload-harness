# llama-swap.win-vulkan.yaml — offload-harness family on the llama.cpp VULKAN backend
# (native Windows; AMD Radeon incl. 780M/gfx1103 and discrete RDNA3, or any Vulkan GPU).
# Serving invariants (grammar reliability — do NOT change): --jinja, no MTP,
# reasoning off. Context size, KV type, flash-attn, and the 26B MoE placement are
# PROFILE-DRIVEN: install.ps1 (H2) substitutes the CTX / KV-K / KV-V / FLASH-ATTN
# / MOE-26B tokens from setup/templates/profiles.json. amd-rdna3 renders 16K/f16/
# FA-on as the SAFE FLOOR (selftest's H3 canaries measure the promotions: ctx 32K,
# q8_0 KV, 26B full-offload — the agent applies them canary-gated per SETUP-AGENT.md);
# amd-rdna3-dgpu renders 32K/q8_0 (discrete card); amd-gcn renders 8K/f16/FA-off
# (weakest path). If the selftest hits allocation failures, the 26B profile switches
# to cpu-moe (experts in RAM).
#
# J1 invariants (frontier floor, 2026-07-24):
#   * llama.cpp win-vulkan build must be >= Mar-2026 (the AMD scalar-FA Wave32 +
#     graphics-queue tuning that makes this tier competitive landed Feb–Mar 2026).
#     The installer's pinned tag is the frontier snapshot and satisfies this.
#   * --flash-attn is EXPLICITLY on/off from the profile, never auto: a silent
#     FA-off then fails quantized-V (q8_0) loads on Gemma.
#   * GGML_VK_VISIBLE_DEVICES=0 pins ONE Vulkan device deterministically (multi-ICD
#     boxes can enumerate iGPU + discrete + software rasterizers in varying order).
#     If `llama-server --list-devices` shows the wrong adapter first, change the
#     index here — see SETUP-AGENT.md (amd-rdna3 chapter).
healthCheckTimeout: 300
logLevel: info

macros:
  common: >-
    --ctx-size __CTX__ --flash-attn __FLASH_ATTN__ --cache-type-k __KV_K__ --cache-type-v __KV_V__
    --jinja --reasoning off --port ${PORT} --host 127.0.0.1

models:
  offload-e4b:
    aliases: [gemma4-e4b]
    env: [GGML_VK_VISIBLE_DEVICES=0]
    cmd: >-
      __LLAMA_BIN__\llama-server.exe -m __MODELS__\gemma-4-E4B-it-qat-UD-Q4_K_XL.gguf
      -ngl 999 --parallel 1 ${common}
    ttl: 300
  gemma4-e2b:
    env: [GGML_VK_VISIBLE_DEVICES=0]
    cmd: >-
      __LLAMA_BIN__\llama-server.exe -m __MODELS__\gemma-4-E2B-it-qat-UD-Q4_K_XL.gguf
      -ngl 999 ${common}
    ttl: 300
  gemma4-26b-a4b:
    env: [GGML_VK_VISIBLE_DEVICES=0]
    cmd: >-
      __LLAMA_BIN__\llama-server.exe -m __MODELS__\gemma-4-26B-A4B-it-qat-UD-Q4_K_XL.gguf
      __MOE_26B__ --parallel 1 ${common}
    ttl: 300
  embeddinggemma:
    env: [GGML_VK_VISIBLE_DEVICES=0]
    cmd: >-
      __LLAMA_BIN__\llama-server.exe -m __MODELS__\embeddinggemma-300m-Q8_0.gguf
      --embedding --pooling mean --ctx-size 2048 --parallel 4 --port ${PORT} --host 127.0.0.1
    ttl: 600

groups:
  offload-family:
    swap: true
    exclusive: true
    members: [offload-e4b, gemma4-e2b, gemma4-26b-a4b]
