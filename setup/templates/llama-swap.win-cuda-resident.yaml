# llama-swap.win-cuda-resident.yaml — offload-harness family, big-VRAM single-GPU
# ALL-RESIDENT serving (blackwell-32/48/72 — configs #13-15, spec
# docs/superpowers/specs/2026-07-16-blackwell-profile-tiers-design.md).
# Every model is a standalone entry with NO swap group and NO ttl: ungrouped
# models run CONCURRENTLY in llama-swap, so the whole roster stays hot with zero
# swap latency — that is the point of a >=24GB card. llama-swap does NO VRAM
# accounting: these profiles are only selected at >=24GB dedicated VRAM, and an
# H3-style selftest on the real box confirms the fit (all values PROJECTED).
# Serving invariants (grammar reliability — do NOT change): --jinja, no MTP,
# reasoning off. Context size, KV cache type, flash-attn, and the 26B MoE
# placement are PROFILE-DRIVEN: install.ps1 (H2) substitutes the CTX / KV-K /
# KV-V / FLASH-ATTN / MOE-26B tokens from setup/templates/profiles.json.
# GGML_CUDA_DISABLE_GRAPHS=1 stays set for the 26B tier.
healthCheckTimeout: 300
logLevel: info

macros:
  common: >-
    --ctx-size __CTX__ --flash-attn __FLASH_ATTN__ --cache-type-k __KV_K__ --cache-type-v __KV_V__
    --jinja --reasoning off --port ${PORT} --host 127.0.0.1

models:
  offload-e4b:
    aliases: [gemma4-e4b]
    cmd: >-
      __LLAMA_BIN__\llama-server.exe -m __MODELS__\gemma-4-E4B-it-qat-UD-Q4_K_XL.gguf
      -ngl 99 --parallel 1 ${common}
  gemma4-e2b:
    cmd: >-
      __LLAMA_BIN__\llama-server.exe -m __MODELS__\gemma-4-E2B-it-qat-UD-Q4_K_XL.gguf
      -ngl 99 ${common}
  gemma4-26b-a4b:
    env: [GGML_CUDA_DISABLE_GRAPHS=1]
    cmd: >-
      __LLAMA_BIN__\llama-server.exe -m __MODELS__\gemma-4-26B-A4B-it-qat-UD-Q4_K_XL.gguf
      __MOE_26B__ --parallel 1 ${common}
  embeddinggemma:
    cmd: >-
      __LLAMA_BIN__\llama-server.exe -m __MODELS__\embeddinggemma-300m-Q8_0.gguf
      --embedding --pooling mean --ctx-size 2048 --parallel 4 --port ${PORT} --host 127.0.0.1
