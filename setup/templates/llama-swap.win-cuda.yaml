# llama-swap.win-cuda.yaml — offload-harness family on the llama.cpp CUDA backend
# (native Windows; NVIDIA GPU, verified on 8GB). Serving invariants (grammar
# reliability — do NOT change): --jinja, f16 KV, no MTP, reasoning off.
# MoE tier: the verified NVIDIA 8GB config keeps experts in RAM (--cpu-moe)
# with the non-expert layers on the GPU (-ngl 999), plus GGML_CUDA_DISABLE_GRAPHS=1.
healthCheckTimeout: 300
logLevel: info

macros:
  common: >-
    --ctx-size 8192 --flash-attn on --cache-type-k f16 --cache-type-v f16
    --jinja --reasoning off --port ${PORT} --host 127.0.0.1

models:
  offload-e4b:
    aliases: [gemma4-e4b]
    cmd: >-
      __LLAMA_BIN__\llama-server.exe -m __MODELS__\gemma-4-E4B-it-qat-UD-Q4_K_XL.gguf
      -ngl 99 --parallel 1 ${common}
    ttl: 300
  gemma4-e2b:
    cmd: >-
      __LLAMA_BIN__\llama-server.exe -m __MODELS__\gemma-4-E2B-it-qat-UD-Q4_K_XL.gguf
      -ngl 99 ${common}
    ttl: 300
  gemma4-26b-a4b:
    env: [GGML_CUDA_DISABLE_GRAPHS=1]
    cmd: >-
      __LLAMA_BIN__\llama-server.exe -m __MODELS__\gemma-4-26B-A4B-it-qat-UD-Q4_K_XL.gguf
      --cpu-moe -ngl 999 --parallel 1 ${common}
    ttl: 300
  embeddinggemma:
    cmd: >-
      __LLAMA_BIN__\llama-server.exe -m __MODELS__\embeddinggemma-300m-Q8_0.gguf
      --embedding --pooling mean --ctx-size 2048 --parallel 4 --port ${PORT} --host 127.0.0.1
    ttl: 600

groups:
  offload-family:
    swap: true
    exclusive: true
    members: [offload-e4b, gemma4-e2b, gemma4-26b-a4b]
